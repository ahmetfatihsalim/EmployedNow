services:
  employednow-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/employednow.db
      - Jwt__Key=EmployedNow_ChangeThisToAStrongKey_2026_MVP
      - Jwt__Issuer=EmployedNow
      - Jwt__Audience=EmployedNowClients
      - Webhook__PremiumSecret=employednow-premium-secret
      - Cors__AllowedOrigins=http://localhost:5173,http://localhost:5000
    volumes:
      - ./data:/app/data

  employednow-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "5173:80"
    depends_on:
      - employednow-api
